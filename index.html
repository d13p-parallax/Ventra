<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ventra — v1 beta (limited)</title>
<link rel="icon" type="image/x-icon" href="./favicon.ico">

  <style>
    :root{
      --text:#111111;
      --muted:#555555;
      --line:rgba(0,0,0,.12);
      --pink:#F3AAC0;
      --surface:rgba(255,255,255,.92);
    }

    *{
      box-sizing:border-box;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }

    body{
      margin:0;
      color:var(--text);
      background:linear-gradient(to top, var(--pink) 0%, #ffffff 45%);
      min-height:100dvh;
    }

    /* one clean surface, no boxed header/card */
    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:18px 24px calc(170px + env(safe-area-inset-bottom, 0px)); /* bottom space for fixed composer + footer */
    }

    .card{
      background:transparent;
      border:none;
      box-shadow:none;
      padding:0;
    }

    /* header (no darker band) */
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:6px 0 14px;
      border-bottom:1px solid var(--line);
      background:transparent;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .avatar{
      width:34px;
      height:34px;
      border-radius:10px;
      overflow:hidden;
      background:transparent;
      display:grid;
      place-items:center;
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    h1{ margin:0; font-size:18px; letter-spacing:.2px; }
    .sub{ color:var(--muted); font-size:12px; }

    .pill{
      font-size:12px;
      color:var(--muted);
      border:1px solid var(--line);
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.65);
    }

    /* CENTERED toggle + description (like your mock) */
    .modebar{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      margin-top:18px;
    }

    .toggle{
      display:flex;
      border:1px solid var(--line);
      border-radius:999px;
      overflow:hidden;
      background:rgba(255,255,255,.65);
    }

    .toggle button{
      background:transparent;
      color:var(--muted);
      border:0;
      padding:10px 18px;
      cursor:pointer;
      font-size:13px;
      border-radius:0;
    }

    /* selected mode: clear edge + fill */
    .toggle button.active{
      background:#ffffff;
      color:var(--text);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.10);
    }

    .modeDesc{
      font-size:13px;
      color:#333;
      text-align:center;
    }

    /* chat area: centered, tall, clean */
    .chat{
      margin-top:22px;
      background:transparent;
      border:none;
      padding:0;
      min-height:0;
    }

    .msg{
  width:100%;
  margin:12px 0;
  display:flex;
  gap:12px;
  align-items:flex-start;
    }

    .role{
      min-width:78px;
      color:var(--muted);
      font-size:12px;
      padding-top:8px;
    }

.bubble{
  width: fit-content;
  max-width: 640px;
  padding:12px 14px;
  border-radius:18px;
  border:1px solid var(--line);
  line-height:1.45;
  background:rgba(255,255,255,.85);
}

.msg.user{
  justify-content:flex-end;
  flex-direction:row;
    }

    .msg.user .role{
      min-width:auto;
      margin-left:10px;
      text-align:left;
    }

.msg.user .bubble{
  background:#f5bbcc;
  border-color:rgba(0,0,0,.08);
    }

    /* composer: centered + floating */
    .composer{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:calc(44px + env(safe-area-inset-bottom, 0px));
      width:min(980px, calc(100% - 48px));
      display:flex;
      gap:10px;
      align-items:flex-end;
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:22px;
      padding:12px;
      box-shadow:0 12px 35px rgba(0,0,0,.08);
      backdrop-filter: blur(6px);
    }

    textarea{
      width:100%;
      min-height:44px;
      max-height:160px;
      resize:none;
      box-sizing:border-box;
      border:none;
      outline:none;
      background:transparent;
      color:var(--text);
      padding:12px 10px;
      line-height:1.35;
      font-size:14px;
    }

    .textarea-wrap{
      flex:1;
      position:relative;
      min-height:44px;
    }

    .typewriter-ph{
      position:absolute;
      inset:0;
      padding:12px 10px;
      font-size:14px;
      line-height:1.35;
      color:rgba(85,85,85,.45);
      pointer-events:none;
      white-space:pre-wrap;
      overflow:hidden;
    }

    .typewriter-ph::after{
      content:'|';
      animation:twBlink .9s step-end infinite;
      color:rgba(85,85,85,.35);
    }

    @keyframes twBlink{
      0%,100%{opacity:1}
      50%{opacity:0}
    }

    .right{
      display:flex;
      flex-direction:column;
      gap:6px;
      align-items:flex-end;
    }

    .counter{
      font-size:12px;
      color:var(--muted);
    }

    .btn{
      background:#111;
      color:#fff;
      border:0;
      padding:10px 16px;
      border-radius:16px;
      cursor:pointer;
      font-weight:600;
    }

    .btn:disabled{ opacity:.5; cursor:not-allowed; }

    .footer{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:calc(10px + env(safe-area-inset-bottom, 0px));
      width:min(980px, calc(100% - 48px));
      text-align:center;
      color:var(--muted);
      font-size:12px;
      line-height:1.3;
      background:transparent;
      padding:0;
      margin:0;
    }
  .modeRow{
  width:100%;
  position:relative;
  display:flex;
  align-items:center;
  gap:12px;
}

/* keep the toggle perfectly centered */
.modeRow .toggle{
  margin:0 auto;
}

/* pin report button to the right */
.reportBtn{
  position:absolute;
  right:0;
  cursor:pointer;
  user-select:none;
}

.reportBtn:disabled{
  opacity:.5;
  cursor:not-allowed;
}

    .warn{ color:#b00020; }

    @media (max-width: 640px) {
      textarea { resize: none; font-size: 16px; }

      .role { min-width: 44px; font-size: 11px; }

      .toggle button { padding: 12px 20px; font-size: 14px; }

      .modeRow { flex-wrap: wrap; justify-content: center; }
      .modeRow .toggle { margin: 0 auto; }
      .reportBtn { position: static; margin-top: 4px; }

      .composer { width: calc(100% - 24px); }
      .footer { width: calc(100% - 24px); }
    }

.typingDots{
  display:flex;
  gap:6px;
  align-items:center;
  justify-content:flex-start;
  min-width:60px;
}

.typingDots .dot{
  width:7px;
  height:7px;
  border-radius:50%;
  background:rgba(0,0,0,.35);
  display:inline-block;
  animation:bounce 1.1s infinite ease-in-out;
}

.typingDots .dot:nth-child(2){ animation-delay:.15s; }
.typingDots .dot:nth-child(3){ animation-delay:.30s; }

@keyframes bounce{
  0%, 80%, 100% { transform: translateY(0); opacity:.35; }
  40% { transform: translateY(-6px); opacity:.9; }
}
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div class="brand">
          <div class="avatar">
            <img src="logo.png" alt="Ventra" />
          </div>
          <h1 id="titleName">Ventra</h1>
        </div>
        <div class="pill sub">Warm. Safe. Steady.</div>
      </div>

      <!-- SINGLE toggle (this is the only one now) -->
      <div class="modebar">
  <div class="modeRow">
    <div class="toggle" id="modeToggle">
      <button type="button" class="active" data-mode="vent">Vent</button>
      <button type="button" data-mode="solution">Solution</button>
    </div>

    <button type="button" class="pill reportBtn" id="reportBtn" style="display:none;">Get Report</button>

  </div>

  <div class="modeDesc" id="modeDesc">
    Vent mode: listen + reflect (no fixing unless asked).
  </div>
</div>

      <div class="chat" id="chat"></div>

      <div class="composer">
        <div class="textarea-wrap">
          <textarea id="input" placeholder=""></textarea>
          <div class="typewriter-ph" id="typewriterPh"></div>
        </div>
        <div class="right">
          <div class="counter" id="counter">0 / 1500</div>
          <button class="btn" id="sendBtn" disabled>Send</button>
        </div>
      </div>

      <div class="footer">
        <div>This is not a medical app and not a replacement for professional help.</div>
        <div class="warn" id="limitWarn" style="display:none;">Input too long — shorten it to 1500 characters.</div>
      </div>
    </div>
  </div>

  <script>
    const MAX = 1500;

    const mascotName = "Ventra";
    const BACKEND_URL = "/api/chat";
    const REPORT_URL  = "/api/report";

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const counter = document.getElementById("counter");
    const sendBtn = document.getElementById("sendBtn");
    const limitWarn = document.getElementById("limitWarn");

    const titleName = document.getElementById("titleName");
    const modeToggle = document.getElementById("modeToggle");
    const modeDesc = document.getElementById("modeDesc");
    const modeButtons = Array.from(modeToggle.querySelectorAll("button"));
    const reportBtn = document.getElementById("reportBtn");
let isPending = false;

function setPending(state){
  isPending = state;
  sendBtn.disabled = state || sendBtn.disabled; // keep disabled if empty/tooLong
  sendBtn.style.opacity = state ? "0.6" : "1";
  sendBtn.style.cursor = state ? "not-allowed" : "pointer";
}


    titleName.textContent = mascotName;
    document.title = `${mascotName} — v1 beta (limited)`;

    let mode = "vent"; // "vent" | "solution"
    let history = []; // session-only, in-memory, not saved anywhere
    reportBtn.style.display = "none";

    function setMode(next) {
      mode = next;

      // visual state
      modeButtons.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.mode === mode);
      });

      // description text per mode
      modeDesc.textContent = (mode === "vent")
        ? "Vent mode: listen + reflect (no fixing unless asked)."
        : "Solution mode: clarity-first (we can explore, or switch to concrete options if you want).";
        reportBtn.style.display = (mode === "solution") ? "inline-block" : "none";
    }

    // wire the toggle buttons
    modeButtons.forEach(btn => {
      btn.addEventListener("click", () => setMode(btn.dataset.mode));
    });

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, s => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[s]));
    }

    function formatNoWall(text) {
  const withBold = escapeHtml(text).replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
  const parts = withBold.trim().split(/\n\s*\n/).filter(Boolean);
  return parts
    .map(p => `<p>${p.trim().replace(/\n/g, "<br>")}</p>`)
    .join("");
}
let typingEl = null;

function showTypingDots(){
  if(typingEl) return;

  typingEl = document.createElement("div");
  typingEl.className = "msg bot";
  typingEl.innerHTML = `
    <div class="role">${escapeHtml(mascotName)}</div>
    <div class="bubble typingDots">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
  `;
  chat.appendChild(typingEl);
  window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
}

function hideTypingDots(){
  if(!typingEl) return;
  typingEl.remove();
  typingEl = null;
}

    function addMsg(role, html, plainTextForHistory = "") {
  const wrap = document.createElement("div");
  const isUser = role === "You";
  wrap.className = "msg " + (isUser ? "user" : "bot");
  wrap.innerHTML = `
    <div class="role">${escapeHtml(role)}</div>
    <div class="bubble">${html}</div>
  `;
  chat.appendChild(wrap);
  window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });

  // Store only user/assistant turns (session-only)
  if (plainTextForHistory) {
    if (role === "You") history.push({ role: "user", content: plainTextForHistory });
    else if (role === mascotName) history.push({ role: "assistant", content: plainTextForHistory });
  }
}

    function updateUI() {
      const len = input.value.length;
      counter.textContent = `${len} / ${MAX}`;
      const tooLong = len > MAX;
      limitWarn.style.display = tooLong ? "block" : "none";
      sendBtn.disabled = (len === 0 || tooLong);
    }

    async function callBackend(userText) {
  try {
    showTypingDots();

    // FORCE browser to paint the dots
    await new Promise(requestAnimationFrame);
    await new Promise(r => setTimeout(r, 300));

    const historyForSend =
      (history.length &&
       history[history.length - 1].role === "user" &&
       history[history.length - 1].content === userText)
        ? history.slice(0, -1)
        : history;

    const res = await fetch(BACKEND_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message: userText,
        mode,
        history: historyForSend
      })
    });

    const data = await res.json();

    // If backend auto-switches modes, sync UI
    if (data.mode && data.mode !== mode) setMode(data.mode);

    const replyText = data.reply || "No reply returned.";
    hideTypingDots();
    addMsg(mascotName, formatNoWall(replyText), replyText);
    setPending(false);
  } catch (e) {
     hideTypingDots();
    addMsg(mascotName, "<p><b>Something went wrong.</b> The connection didn't work.</p>", "Something went wrong. The connection didn't work.");
  setPending(false);
}
}

    // ── Typewriter placeholder ──────────────────────────────────
    const TW_PHRASES = [
      "I've been holding this in for a while...",
      "Something happened today that I can't shake...",
      "I just need to let this out...",
      "I don't know where else to turn right now...",
      "Things have been heavy lately and I need to talk..."
    ];
    const twEl = document.getElementById("typewriterPh");
    let twPhrase = 0, twChar = 0, twDeleting = false, twTimer = null, twRunning = false;

    function typewriterStep() {
      const phrase = TW_PHRASES[twPhrase];
      if (!twDeleting) {
        twChar++;
        twEl.textContent = phrase.slice(0, twChar);
        if (twChar === phrase.length) {
          twTimer = setTimeout(() => { twDeleting = true; typewriterStep(); }, 2200);
          return;
        }
        twTimer = setTimeout(typewriterStep, 55);
      } else {
        twChar--;
        twEl.textContent = phrase.slice(0, twChar);
        if (twChar === 0) {
          twDeleting = false;
          twPhrase = (twPhrase + 1) % TW_PHRASES.length;
          twTimer = setTimeout(typewriterStep, 380);
          return;
        }
        twTimer = setTimeout(typewriterStep, 28);
      }
    }

    function startTypewriter() {
      if (twRunning || input.value) return;
      twRunning = true;
      twEl.style.display = "block";
      typewriterStep();
    }

    function stopTypewriter() {
      if (twTimer) clearTimeout(twTimer);
      twRunning = false;
      twEl.style.display = "none";
    }

    input.addEventListener("focus", () => { if (!input.value) stopTypewriter(); });
    input.addEventListener("blur",  () => { if (!input.value) startTypewriter(); });

    startTypewriter();
    // ────────────────────────────────────────────────────────────

    function sendMessage() {
  if (isPending) return;

  const text = input.value.trim();
  if (!text) return;

  setPending(true);

  addMsg("You", formatNoWall(text), text);
  input.value = "";
  updateUI();
  startTypewriter();

  callBackend(text);
}

    // enter to send (shift+enter = newline)
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled) sendMessage();
      }
    });

    input.addEventListener("input", () => {
      updateUI();
      if (input.value) stopTypewriter();
      else startTypewriter();
    });
    sendBtn.addEventListener("click", sendMessage);

    reportBtn.addEventListener("click", async () => {
  if (mode !== "solution") return;

  reportBtn.disabled = true;
  const oldLabel = reportBtn.textContent;
  reportBtn.textContent = "Generating...";

  try {
    const res = await fetch(REPORT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ history })
    });

    const data = await res.json();
    const reportText = data.report || "No report returned.";

    addMsg(mascotName, formatNoWall(reportText), reportText);
  } catch (e) {
    addMsg(
      mascotName,
      "<p><b>Couldn't generate report.</b> Try again.</p>",
      "Couldn't generate report. Try again."
    );
  } finally {
    reportBtn.disabled = false;
    reportBtn.textContent = oldLabel;
  }
});

    // Seed message
    addMsg(mascotName, `<p><b>Hi.</b> Vent or Solution — your call.</p><p>What's on your mind?</p>`);
    updateUI();
  </script>
</body>
</html>
